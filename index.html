<!doctype html>
<html>
  <head>
      <script src="https://cdn.jsdelivr.net/pyodide/v314.0.0/full/pyodide.js"></script>
      <link rel="stylesheet" href="style.css">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.5.1/katex.min.css">
       <script src="https://cdn.jsdelivr.net/npm/markdown-it-task-lists@2.1.1/dist/markdown-it-task-lists.min.js"></script>
      <!-- <link href="https://cdn.jsdelivr.net/npm/markdown-it-highlight@0.2.0/dist/index.min.css" rel="stylesheet"> -->
  </head>
  <body>
    <div id="preparation">
      起動中
      <div class="loader"></div>
    </div>

    <header id="header">
      <span id="title">インスタントノート</span>
      
      <button id="run">Run</button>
      
      <div class="box">
        ファイル
        <select id="files"></select>
      </div>

      <div class="box">
        言語
        <select id="languages"></select>
      </div>

      <div class="box">
        テーマ
        <select id="theme">
          <option value="light">ライト</option>
          <option value="dark">ダーク</option>
        </select>
      </div>

      <div class="box">
        ファイル名(共用)
        <input type="text" name="fileName" id="fileName">
      </div>

      <button id="search">検索</button>

      <button id="download">ダウンロード</button>
    </header>

    <main>
      <div id="code-editor"></div>
      <div id="result">結果はここに出力されます</div>
    </main>

    <script src="./node_modules/monaco-editor/min/vs/loader.js"></script>
    <script type="module" src="main.js"></script>
  </body>
</html>
